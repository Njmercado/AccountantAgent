services:
  # ── PostgreSQL Database ──────────────────────────────────────────
  postgres:
    image: postgres:17-alpine
    container_name: accountant_postgres
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── pgAdmin 4 (Web-based DB Manager) ────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: accountant_pgadmin
    restart: unless-stopped
    env_file: .env
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./pgadmin/servers.json:/pgadmin4/servers.json   # auto-register the DB
    depends_on:
      postgres:
        condition: service_healthy

  # ── Your Application ────────────────────────────────────────────
  # Uncomment when you're ready to containerise the app itself
  # app:
  #   build: .
  #   container_name: accountant_app
  #   env_file: .env
  #   environment:
  #     DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
  #   depends_on:
  #     postgres:
  #       condition: service_healthy

volumes:
  postgres_data:
  pgadmin_data:
